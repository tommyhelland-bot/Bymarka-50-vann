<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1c3a28">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bymarka">
<link rel="manifest" href="manifest.json">
<title>Bymarka 50 Vann</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1c3a28; color: #e8dfc0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #header { background: #1c3a28; padding: 10px 14px; padding-top: calc(10px + env(safe-area-inset-top)); display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #7aad5a; flex-shrink: 0; }
  #header h1 { font-size: 16px; font-weight: 700; }
  #header .sub { font-size: 10px; color: #9aba7a; }
  #visited-count { font-size: 10px; color: #7aad5a; margin-top: 2px; }
  #menu-btn { margin-left: auto; background: rgba(122,173,90,0.2); border: 1px solid #7aad5a; color: #e8dfc0; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; }

  #app { display: flex; flex: 1; overflow: hidden; position: relative; }
  #map { flex: 1; z-index: 0; }

  #panel { position: absolute; left: 0; top: 0; bottom: 0; width: 285px; background: #1c3a28; border-right: 2px solid #7aad5a; overflow-y: auto; transform: translateX(-100%); transition: transform 0.25s ease; z-index: 1000; }
  #panel.open { transform: translateX(0); }
  #panel-header { padding: 14px 12px 8px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(122,173,90,0.3); }
  #panel-header h2 { font-size: 12px; color: #7aad5a; text-transform: uppercase; letter-spacing: 1.5px; }
  #close-btn { background: none; border: none; color: #7aad5a; font-size: 22px; cursor: pointer; }

  .tour-item { padding: 9px 13px; cursor: pointer; border-left: 4px solid transparent; border-bottom: 1px solid rgba(122,173,90,0.1); }
  .tour-item.active { background: rgba(122,173,90,0.15); }
  .tour-row { display: flex; align-items: center; gap: 8px; }
  .tour-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .tour-name { font-size: 12px; color: #e8dfc0; }
  .tour-name.bold { font-weight: bold; }
  .tour-meta { font-size: 10px; color: #7aad5a; margin-top: 2px; }
  .tour-detail { display: none; padding: 7px 0 3px 18px; }
  .tour-detail.open { display: block; }
  .tour-parking { font-size: 10px; color: #b0c890; margin-bottom: 5px; }
  .tour-lake-item { font-size: 11px; color: #e8dfc0; padding: 1px 0; }
  .lnum { font-weight: bold; }

  #huts-section { padding: 10px 13px; border-top: 1px solid rgba(122,173,90,0.3); margin-top: 4px; }
  #huts-section h3 { font-size: 11px; color: #7aad5a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
  .hut-item { font-size: 11px; color: #c8d8b0; padding: 2px 0; }

  #overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; }
  #overlay.show { display: block; }

  #layer-btn { position: absolute; top: 10px; right: 10px; z-index: 900; background: rgba(28,58,40,0.92); border: 1px solid #7aad5a; color: #e8dfc0; padding: 7px 11px; border-radius: 6px; font-size: 12px; cursor: pointer; }

  /* Leaflet popup override */
  .leaflet-popup-content-wrapper { background: #1c3a28; border: 1px solid #7aad5a; border-radius: 8px; color: #e8dfc0; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
  .leaflet-popup-tip { background: #1c3a28; }
  .leaflet-popup-content { margin: 10px 14px; }
  .popup-title { font-size: 14px; font-weight: bold; color: #e8dfc0; margin-bottom: 3px; }
  .popup-sub { font-size: 11px; color: #9aba7a; margin-bottom: 8px; }
  .popup-nav { background: #7aad5a; color: #1c3a28; border: none; padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: bold; cursor: pointer; width: 100%; }
  .popup-visit { background: rgba(122,173,90,0.2); color: #7aad5a; border: 1px solid #7aad5a; padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 6px; }
  .popup-visit.visited { background: #7aad5a; color: #1c3a28; }
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>🏔️ Bymarka 50 Vann</h1>
    <div class="sub">14 dagsturer · Trondheim og Leinstrandmarka</div>
    <div id="visited-count">0/50 besøkt</div>
  </div>
  <button id="menu-btn" onclick="togglePanel()">☰ Turer</button>
</div>

<div id="app">
  <div id="map"></div>
  <div id="overlay" onclick="closePanel()"></div>

  <div id="panel">
    <div id="panel-header">
      <h2>Dagsturer</h2>
      <button id="close-btn" onclick="closePanel()">✕</button>
    </div>
    <div id="tour-list"></div>
    <div id="huts-section">
      <h3>🏠 Serveringshytter</h3>
      <div id="huts-list"></div>
    </div>
  </div>

  <button id="layer-btn" onclick="toggleLayer()">🛰️ Flyfoto</button>
</div>

<script>
const lakeData = [
  {id:1,  name:"Baklidammen",                  lat:63.419240, lng:10.320980},
  {id:2,  name:"Bangtjønna",                   lat:63.398110, lng:10.270140},
  {id:3,  name:"Bjørktjønna",                  lat:63.383380, lng:10.237240},
  {id:4,  name:"Blomstertjønna",               lat:63.418780, lng:10.260960},
  {id:5,  name:"Bosbergdammen",                lat:63.415740, lng:10.166120},
  {id:6,  name:"Bykleivvatnet",                lat:63.393090, lng:10.201630},
  {id:7,  name:"Damvatnet",                    lat:63.436942, lng:10.213388},
  {id:8,  name:"Elsettjønna",                  lat:63.418690, lng:10.209870},
  {id:9,  name:"Fagertjønna",                  lat:63.418922, lng:10.229167},
  {id:10, name:"Fålåtjønnan",                  lat:63.375700, lng:10.292010},
  {id:11, name:"Haukvatnet",                   lat:63.392810, lng:10.318100},
  {id:12, name:"Heisjøen",                     lat:63.387680, lng:10.180080},
  {id:13, name:"Herbernsdammen",               lat:63.440200, lng:10.255180},
  {id:14, name:"Hestsjøen",                    lat:63.357070, lng:10.276500},
  {id:15, name:"Holstdammen",                  lat:63.442155, lng:10.286335},
  {id:16, name:"Jelleintjønna",                lat:63.363140, lng:10.282510},
  {id:17, name:"Klokktjønna, Bynesmarka",      lat:63.374510, lng:10.223450},
  {id:18, name:"Klokktjønna, Trondheimsmarka", lat:63.394290, lng:10.273150},
  {id:19, name:"Kobberdammen",                 lat:63.424060, lng:10.279960},
  {id:20, name:"Kongensåsvatnet",              lat:63.436990, lng:10.225360},
  {id:21, name:"Kutjønna",                     lat:63.413218, lng:10.211946},
  {id:22, name:"Kvistingen",                   lat:63.409290, lng:10.212907},
  {id:23, name:"Kyvatnet",                     lat:63.404746, lng:10.341060},
  {id:24, name:"Kåttåtjønna",                  lat:63.374180, lng:10.286080},
  {id:25, name:"Lauglovatnet",                 lat:63.361660, lng:10.244140},
  {id:26, name:"Lianvatnet",                   lat:63.400710, lng:10.316820},
  {id:27, name:"Litlkvistingen",               lat:63.415050, lng:10.209620},
  {id:28, name:"Litl-Leirsjøen",               lat:63.385710, lng:10.254500},
  {id:29, name:"Litltjønna",                   lat:63.444080, lng:10.272492},
  {id:30, name:"Lomtjønnan",                   lat:63.404190, lng:10.199810},
  {id:31, name:"Lykkjadammen",                 lat:63.446750, lng:10.300930},
  {id:32, name:"Munkauntjønna",                lat:63.444490, lng:10.313300},
  {id:33, name:"Nydammen",                     lat:63.438390, lng:10.291090},
  {id:34, name:"Ramnåsvatnet",                 lat:63.426960, lng:10.208220},
  {id:35, name:"Rognstjønna",                  lat:63.370500, lng:10.214520},
  {id:36, name:"Sagdammen",                    lat:63.365160, lng:10.199180},
  {id:37, name:"Skjellbreia",                  lat:63.396460, lng:10.241160},
  {id:38, name:"Stokkedammen",                 lat:63.418710, lng:10.342190},
  {id:39, name:"Stor-Leirsjøen",               lat:63.384250, lng:10.281690},
  {id:40, name:"Svarttjønna, Bynesmarka",      lat:63.387962, lng:10.198135},
  {id:41, name:"Svartjønna, Trolla",           lat:63.441330, lng:10.300485},
  {id:42, name:"Svartvatnet, Flakk",           lat:63.440761, lng:10.219654},
  {id:43, name:"Svarvatnet, Leinstrand",       lat:63.377341, lng:10.248474},
  {id:44, name:"Sølvskakkeltjønna",            lat:63.381320, lng:10.283320},
  {id:45, name:"Theisendammen",                lat:63.421780, lng:10.345190},
  {id:46, name:"Tiendalsdammen",               lat:63.441950, lng:10.311060},
  {id:47, name:"Tiknepptjønna",                lat:63.429210, lng:10.287770},
  {id:48, name:"Trolltjern",                   lat:63.442823, lng:10.274413},
  {id:49, name:"Velikvatnet",                  lat:63.372360, lng:10.244560},
  {id:50, name:"Vintervatnet",                 lat:63.414500, lng:10.251860},
];

const tourAssignment = {
  1:[1,19,38,45,47], 2:[4,8,9,21,22,27,30,50], 3:[13,29,48],
  4:[31,32,33,41,46,15], 5:[7,20,34,42], 6:[2,18,39],
  7:[11,23,26], 8:[6,12,40], 9:[17,35,36],
  10:[10,24], 11:[5], 12:[3,28,37,44], 13:[14,16], 14:[25,43,49]
};

const tours = [
  {id:1,  name:"Baklia / Ilavassdraget",  parking:"Baklia — Byåsen butikksenter", plat:63.416380, plng:10.323414, km:"~7 km",  hours:"2–3 t", color:"#e74c3c"},
  {id:2,  name:"Gråkallen",               parking:"Gråkallen P",                  plat:63.418025, plng:10.260590, km:"~9 km",  hours:"3–4 t", color:"#2980b9"},
  {id:3,  name:"Tømmerdalen",             parking:"Tømmerdalen",                  plat:63.433466, plng:10.271868, km:"~9 km",  hours:"3–4 t", color:"#27ae60"},
  {id:4,  name:"Trolla",                  parking:"Trolla-parkeringen",            plat:63.448263, plng:10.301603, km:"~8 km",  hours:"2–3 t", color:"#8e44ad"},
  {id:5,  name:"Klefstadhaugen / Flakk",  parking:"Klefstadhaugen",               plat:63.433153, plng:10.185674, km:"~10 km", hours:"3–4 t", color:"#d35400"},
  {id:6,  name:"Granåsen nord",           parking:"Granåsen / Leirbrua",           plat:63.380048, plng:10.313700, km:"~7 km",  hours:"2–3 t", color:"#16a085"},
  {id:7,  name:"Kyvannet / Haukvatnet",   parking:"Kyvannet P",                   plat:63.407125, plng:10.343961, km:"~6 km",  hours:"2 t",   color:"#c0392b"},
  {id:8,  name:"Oppland / Bjørnaråsen",   parking:"Oppland",                       plat:63.387827, plng:10.161498, km:"~9 km",  hours:"3–4 t", color:"#2c3e50"},
  {id:9,  name:"Gaustad",                 parking:"Gaustad — Perstu",              plat:63.363240, plng:10.193250, km:"~8 km",  hours:"2–3 t", color:"#f39c12"},
  {id:10, name:"Nybron",                  parking:"Nybron / Smistadgrenda",        plat:63.369100, plng:10.306390, km:"~5 km",  hours:"2 t",   color:"#7f8c8d"},
  {id:11, name:"Bosbergdammen",           parking:"Bosbergaunet / Fortuna",        plat:63.413049, plng:10.158222, km:"~2 km",  hours:"1 t",   color:"#1abc9c"},
  {id:12, name:"Granåsen sør",            parking:"Granåsen / Leirbrua",           plat:63.380048, plng:10.313700, km:"~9 km",  hours:"3–4 t", color:"#e91e63"},
  {id:13, name:"Hestsjøen",               parking:"Hestsjøen P",                  plat:63.358421, plng:10.280526, km:"~4 km",  hours:"1–2 t", color:"#ff5722"},
  {id:14, name:"Skarsleite / Ringvål",    parking:"Skarsleite / Ringvål",          plat:63.355647, plng:10.252480, km:"~8 km",  hours:"2–3 t", color:"#9c27b0"},
];

const huts = [
  {name:"Skistua",        info:"Åpen ti-sø · buss 18 stopper utenfor",  lat:63.417550, lng:10.261280},
  {name:"Grønlia",        info:"Åpen man-sø · ved Skjellbreia",          lat:63.402430, lng:10.242810},
  {name:"Lavollen",       info:"Åpen hver dag · nær Baklidammen",        lat:63.423110, lng:10.304500},
  {name:"Damhaugen",      info:"Helgeåpent · ved Holstdammen",           lat:63.442470, lng:10.290690},
  {name:"Elgsethytta",    info:"Åpen ti-sø · Bynesmarka",                lat:63.419290, lng:10.211540},
  {name:"Rønningen",      info:"Åpen ti-sø · v/ Stor-Leirsjøen",         lat:63.378270, lng:10.262420},
  {name:"Lian restaurant",info:"Ved Lianvatnet og trikke-endestasjon",   lat:63.402440, lng:10.310550},
];

// Assign tours
lakeData.forEach(l => l.tour = 0);
for(const [tid, ids] of Object.entries(tourAssignment)){
  ids.forEach(id => { const l = lakeData.find(x=>x.id===id); if(l) l.tour=parseInt(tid); });
}
function tourColor(id){ return tours.find(t=>t.id===id)?.color||'#888888'; }

// ── MAP ───────────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([63.405, 10.270], 12);

const topoTiles = L.tileLayer('https://cache.kartverket.no/v1/wmts/1.0.0/topo/default/webmercator/{z}/{y}/{x}.png', {
  attribution: '© <a href="https://kartverket.no">Kartverket</a>',
  maxZoom: 18,
}).addTo(map);

const orthoTiles = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '© <a href="https://www.esri.com">Esri</a>',
  maxZoom: 19,
});

let showOrtho = false;
function toggleLayer(){
  showOrtho = !showOrtho;
  if(showOrtho){ map.removeLayer(topoTiles); orthoTiles.addTo(map); }
  else { map.removeLayer(orthoTiles); topoTiles.addTo(map); }
  document.getElementById('layer-btn').textContent = showOrtho ? '🗺️ Topokart' : '🛰️ Flyfoto';
}

// ── VISITED ───────────────────────────────────────────────────────────────────
let visited = new Set(JSON.parse(localStorage.getItem('bymarka-visited') || '[]'));

function saveVisited(){
  localStorage.setItem('bymarka-visited', JSON.stringify([...visited]));
  updateCounter();
}

function toggleVisited(id){
  if(visited.has(id)) visited.delete(id);
  else visited.add(id);
  saveVisited();
  const lm = lakeMarkers.find(x=>x.lake.id===id);
  if(lm) lm.marker.setIcon(makeCircleIcon(tourColor(lm.lake.tour), lm.lake.id, activeTour !== null && lm.lake.tour !== activeTour));
  // Refresh popup
  const lm2 = lakeMarkers.find(x=>x.lake.id===id);
  if(lm2) lm2.marker.openPopup();
}

function updateCounter(){
  document.getElementById('visited-count').textContent = `${visited.size}/50 besøkt`;
}

// ── MARKERS ───────────────────────────────────────────────────────────────────
let activeTour = null;
const lakeMarkers = [];

function makeCircleIcon(color, id, dimmed){
  const isVisited = visited.has(id);
  const opacity = dimmed ? 0.2 : 1;
  const svg = isVisited
    ? `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26">
        <circle cx="13" cy="13" r="11" fill="${color}" fill-opacity="${dimmed ? 0.2 : 0.4}" stroke="white" stroke-width="2"/>
        <text x="13" y="17" text-anchor="middle" font-size="13" font-family="monospace" fill="white" fill-opacity="${opacity}">✓</text>
      </svg>`
    : `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26">
        <circle cx="13" cy="13" r="11" fill="${color}" fill-opacity="${opacity}" stroke="white" stroke-width="2"/>
        <text x="13" y="17" text-anchor="middle" font-size="9" font-weight="bold" font-family="monospace" fill="white" fill-opacity="${opacity}">${id}</text>
      </svg>`;
  return L.divIcon({
    html: svg, className: '', iconSize:[26,26], iconAnchor:[13,13], popupAnchor:[0,-14]
  });
}

lakeData.forEach(lake => {
  const color = tourColor(lake.tour);
  const marker = L.marker([lake.lat, lake.lng], {
    icon: makeCircleIcon(color, lake.id, false),
    title: lake.name
  });
  const tour = tours.find(t=>t.id===lake.tour);
  marker.bindPopup(() => {
    const isV = visited.has(lake.id);
    return `
      <div class="popup-title">${lake.id}. ${lake.name}</div>
      <div class="popup-sub" style="color:${color}">${tour ? 'Tur '+tour.id+': '+tour.name : ''}</div>
      <button class="popup-visit ${isV ? 'visited' : ''}" onclick="toggleVisited(${lake.id})">
        ${isV ? '✓ Besøkt' : '○ Merk som besøkt'}
      </button>
      <button class="popup-nav" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${lake.lat},${lake.lng}&travelmode=driving','_blank')">🗺️ Naviger til vannet</button>
      ${tour ? `<button class="popup-nav" style="margin-top:4px;background:rgba(122,173,90,0.15)" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${tour.plat},${tour.plng}&travelmode=driving','_blank')">🅿️ Naviger til parkering</button>` : ''}
    `;
  });
  marker.addTo(map);
  lakeMarkers.push({marker, lake});
});

// Hut markers
huts.forEach(hut => {
  const icon = L.divIcon({
    html: '<div style="font-size:22px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5))">🏠</div>',
    className: '', iconSize:[24,24], iconAnchor:[12,20], popupAnchor:[0,-22]
  });
  const marker = L.marker([hut.lat, hut.lng], {icon, title: hut.name});
  marker.bindPopup(`
    <div class="popup-title">🏠 ${hut.name}</div>
    <div class="popup-sub">${hut.info}</div>
    <button class="popup-nav" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${hut.lat},${hut.lng}&travelmode=driving','_blank')">🗺️ Naviger hit</button>
  `);
  marker.addTo(map);
});

function updateMarkers(){
  lakeMarkers.forEach(({marker, lake}) => {
    const dimmed = activeTour !== null && lake.tour !== activeTour;
    marker.setIcon(makeCircleIcon(tourColor(lake.tour), lake.id, dimmed));
  });
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
const tourList = document.getElementById('tour-list');
tours.forEach(tour => {
  const count = lakeData.filter(l=>l.tour===tour.id).length;
  const div = document.createElement('div');
  div.className = 'tour-item';
  div.dataset.id = tour.id;
  div.style.borderLeftColor = 'transparent';
  div.innerHTML = `
    <div class="tour-row">
      <div class="tour-dot" style="background:${tour.color}"></div>
      <div style="flex:1">
        <div class="tour-name">Tur ${tour.id}: ${tour.name}</div>
        <div class="tour-meta">${tour.km} · ${tour.hours} · ${count} vann</div>
      </div>
    </div>
    <div class="tour-detail" id="td-${tour.id}">
      <div class="tour-parking">🅿️ ${tour.parking}</div>
      ${lakeData.filter(l=>l.tour===tour.id).sort((a,b)=>a.id-b.id).map(l=>
        `<div class="tour-lake-item"><span class="lnum" style="color:${tour.color}">${l.id}.</span> ${l.name}</div>`
      ).join('')}
    </div>`;
  div.addEventListener('click', () => selectTour(tour.id));
  tourList.appendChild(div);
});

const hutsList = document.getElementById('huts-list');
huts.forEach(h => {
  const d = document.createElement('div');
  d.className = 'hut-item';
  d.textContent = h.name;
  hutsList.appendChild(d);
});

function selectTour(id){
  activeTour = activeTour===id ? null : id;
  document.querySelectorAll('.tour-item').forEach(el => {
    const tid = parseInt(el.dataset.id);
    const active = tid===activeTour;
    el.classList.toggle('active', active);
    el.style.borderLeftColor = active ? tours.find(t=>t.id===tid).color : 'transparent';
    el.querySelector('.tour-name').classList.toggle('bold', active);
    el.querySelector('.tour-detail').classList.toggle('open', active);
  });
  updateMarkers();
  if(activeTour){
    const t = tours.find(x=>x.id===activeTour);
    map.flyTo([t.plat, t.plng], 13, {duration:1});
    closePanel();
  }
}

function togglePanel(){
  document.getElementById('panel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

if('serviceWorker' in navigator){
